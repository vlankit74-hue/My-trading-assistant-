# Render Blueprint — deploy everything from this one file.
# On Render: New > Blueprint > connect your GitHub repo. Render reads this
# file automatically and proposes all services below. You'll be prompted
# to fill in the secret values marked "sync: false".
#
# Docs: https://render.com/docs/blueprint-spec

services:
  # --- Backend: FastAPI service ---
  - type: web
    name: trading-assistant-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      # Update this after your frontend's first deploy if the URL differs
      - key: CORS_ORIGINS
        value: '["https://trading-assistant-frontend.onrender.com"]'
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: trading-assistant-cache
          property: connectionString
      - key: TWELVEDATA_API_KEY
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1
      - key: PRICE_REFRESH_INTERVAL_SEC
        value: "30"
      - key: ANALYSIS_REFRESH_INTERVAL_SEC
        value: "120"
      - key: API_RATE_LIMIT
        value: 60/minute
      - key: INTERNAL_API_KEY
        generateValue: true

  # --- Frontend: static React build ---
  - type: web
    name: trading-assistant-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://trading-assistant-backend.onrender.com

  # --- Key Value store (Redis-compatible) for live-price pub/sub + caching ---
  - type: keyvalue
    name: trading-assistant-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
